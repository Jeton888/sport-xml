name: Update XML Every 30 Min
on:
  schedule:
    - cron: '*/30 * * * *'  # çdo 30 minuta
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Download XML files
        run: |
          curl -k "https://mullafabz.xyz/HOST/LiveTV/sportsstreamz.xml" -o sportsstreamz.xml || true
          curl -k "https://raw.githubusercontent.com/mullafabz/Live/master/CASA.xml" -o CASA.xml || true
      
      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add sportsstreamz.xml CASA.xml
          git diff --staged --quiet || git commit -m "Update XML $(date '+%Y-%m-%d %H:%M')"
          git push
